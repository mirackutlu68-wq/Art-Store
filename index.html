<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>ART STORE</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

font-family:Arial,sans-serif;

background:linear-gradient(
135deg,
#050510,
#101040,
#050510
);

background-size:400% 400%;

animation:bg 15s infinite;

color:white;

text-align:center;

min-height:100vh;

}

@keyframes bg{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

#login,
#shop,
#admin{

display:none;

}

#login{

display:block;

padding-top:80px;

}

h1{

font-size:55px;

margin-bottom:25px;

color:cyan;

text-shadow:

0 0 10px cyan,

0 0 25px cyan,

0 0 40px cyan;

}

input{

width:300px;

padding:12px;

margin:6px;

border:none;

border-radius:12px;

font-size:16px;

outline:none;

}

button{

padding:12px 20px;

margin:5px;

border:none;

border-radius:12px;

background:cyan;

color:black;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:

0 0 10px cyan,

0 0 25px cyan;

}

#logout{

position:fixed;

top:15px;

left:15px;

background:red;

color:white;

}

#geld{

position:fixed;

top:15px;

right:15px;

background:#00ff88;

color:black;

padding:12px 18px;

border-radius:15px;

font-size:24px;

font-weight:bold;

box-shadow:

0 0 10px #00ff88,

0 0 25px #00ff88;

}

#meldung{

display:none;

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

background:#00cc66;

padding:15px 30px;

border-radius:12px;

font-weight:bold;

z-index:999;

}

.shop{

display:flex;

flex-wrap:wrap;

justify-content:center;

gap:25px;

padding:25px;

}

.item{

width:240px;

background:#14142b;

border:2px solid cyan;

border-radius:20px;

padding:15px;

box-shadow:0 0 15px cyan;

transition:.3s;

}

.item:hover{

transform:translateY(-5px);

box-shadow:

0 0 25px cyan,

0 0 50px cyan;

}

</style>

</head>

<body>

<div id="meldung">

✅ Kauf erfolgreich!

</div>

<div id="login">

<h1>🎮 ART STORE 🎮</h1>

<input
id="user"
placeholder="Benutzername">

<br>

<input
id="pass"
type="password"
placeholder="Passwort">

<br><br>

<button
onclick="login()">

Anmelden

</button>

<p
id="fehler"
style="color:red;font-weight:bold;">

</p>

</div>

<div id="shop">

<button
id="logout"
onclick="logout()">

Abmelden

</button>

<div id="geld">

0.00 €

</div>

<h1>

🎮 ART STORE 🎮

</h1>

<div class="shop">

<div class="item">

<h3>🧽 Schwamm</h3>

<p>0,99 €</p>

<button
onclick="kaufen(0.99,'Schwamm')">

Kaufen

</button>

</div>

<div class="item">

<h3>🌸 Fake Blume</h3>

<p>2,49 €</p>

<button
onclick="kaufen(2.49,'Fake Blume')">

Kaufen

</button>

</div>

<div class="item">

<h3>🖊️ Random Stift</h3>

<p>1,50 €</p>

<button
onclick="kaufen(1.50,'Random Stift')">

Kaufen

</button>

</div>

<div class="item">

<h3>🥤 Cola Dose</h3>

<p>1,75 €</p>

<button
onclick="kaufen(1.75,'Cola Dose')">

Kaufen

</button>

</div>

<div class="item">

<h3>🪵 A4 Holz Platte</h3>

<p>3,99 €</p>

<button
onclick="kaufen(3.99,'A4 Holz Platte')">

Kaufen

</button>

</div>

<div class="item">

<h3>✂️ Schere</h3>

<p>1,25 €</p>

<button
onclick="kaufen(1.25,'Schere')">

Kaufen

</button>

</div>

<div class="item">

<h3>🎲 Random Sache</h3>

<p>4,99 €</p>

<button
onclick="kaufen(4.99,'Random Sache')">

Kaufen

</button>

</div>

</div>

<h2>

📦 Kaufhistorie

</h2>

<div id="historie">

Noch keine Käufe.

</div>

</div>

<div id="admin">

<button
id="logout"
onclick="logout()">

Abmelden

</button>

<h1>

👑 MIRAC ADMIN 👑

</h1>

<div>

<button onclick="addMoney(1)">+1 €</button>

<button onclick="addMoney(2)">+2 €</button>

<button onclick="addMoney(5)">+5 €</button>

<button onclick="addMoney(10)">+10 €</button>

<button onclick="addMoney(20)">+20 €</button>

<button onclick="addMoney(50)">+50 €</button>

<br><br>

<button onclick="removeMoney(1)">-1 €</button>

<button onclick="removeMoney(2)">-2 €</button>

<button onclick="removeMoney(5)">-5 €</button>

<button onclick="removeMoney(10)">-10 €</button>

<button onclick="removeMoney(20)">-20 €</button>

<button onclick="removeMoney(50)">-50 €</button>

</div>

<h2 id="adminGeld">

0.00 €

</h2>

<script>

const USERS={

Art:{
passwort:"artisthart"
},

Mirac:{
passwort:"mirac911"
}

};

let aktuellerUser="";

let geld=
Number(
localStorage.getItem(
"geld"
)
)||0;

let kaufHistorie=
JSON.parse(
localStorage.getItem(
"historie"
)
)||[];

function speichern(){

localStorage.setItem(
"geld",
geld
);

localStorage.setItem(
"historie",
JSON.stringify(
kaufHistorie
)
);

}

function updateMoney(){

let g=
document.getElementById(
"geld"
);

if(g){

g.innerHTML=
geld.toFixed(2)
+" €";

}

let a=
document.getElementById(
"adminGeld"
);

if(a){

a.innerHTML=
geld.toFixed(2)
+" €";

}

}

function login(){

let u=
document.getElementById(
"user"
).value.trim();

let p=
document.getElementById(
"pass"
).value;

if(
!USERS[u]
){

document.getElementById(
"fehler"
).innerHTML=
"Benutzer nicht gefunden";

return;

}

if(
USERS[u].passwort!==p
){

document.getElementById(
"fehler"
).innerHTML=
"Passwort falsch";

return;

}

aktuellerUser=u;

document.getElementById(
"fehler"
).innerHTML="";

document.getElementById(
"login"
).style.display=
"none";

if(
u==="Mirac"
){

document.getElementById(
"admin"
).style.display=
"block";

}else{

document.getElementById(
"shop"
).style.display=
"block";

}

updateMoney();

updateHistorie();

}

function logout(){

document.getElementById(
"shop"
).style.display=
"none";

document.getElementById(
"admin"
).style.display=
"none";

document.getElementById(
"login"
).style.display=
"block";

document.getElementById(
"user"
).value="";

document.getElementById(
"pass"
).value="";

aktuellerUser="";

}

function addMoney(
betrag
){

geld+=betrag;

speichern();

updateMoney();

}

function removeMoney(
betrag
){

geld-=betrag;

if(
geld<0
){

geld=0;

}

speichern();

updateMoney();

}

function kaufen(
preis,
artikel
){

if(
geld<preis
){

alert(
"Zu wenig Guthaben!"
);

return;

}

geld-=preis;

kaufHistorie.unshift(

"📦 "

+

artikel

+

" - "

+

preis.toFixed(2)

+

" €"

);

speichern();

updateMoney();

updateHistorie();

let m=

document.getElementById(
"meldung"
);

m.style.display=
"block";

setTimeout(

()=>{

m.style.display=
"none";

},

2500

);

}

function updateHistorie(){

let h=

document.getElementById(
"historie"
);

if(
kaufHistorie.length===0
){

h.innerHTML=
"Noch keine Käufe.";

return;

}

h.innerHTML="";

for(
let i=0;
i<kaufHistorie.length;
i++
){

h.innerHTML+=

"<div style='margin:8px;'>"

+

kaufHistorie[i]

+

"</div>";

}

}

window.onload=function(){

updateMoney();

updateHistorie();

};

function sucheArtikel(){

let suche=

document.getElementById(
"suche"
)
.value
.toLowerCase();

let artikel=

document.getElementsByClassName(
"item"
);

for(
let i=0;
i<artikel.length;
i++
){

let text=

artikel[i]
.innerText
.toLowerCase();

if(
text.includes(
suche
)
){

artikel[i]
.style.display=
"block";

}else{

artikel[i]
.style.display=
"none";

}

}

}

console.log(
"ART STORE LOCAL"
);

console.log(
"Login aktiv"
);

console.log(
"localStorage aktiv"
);

console.log(
"Guthaben aktiv"
);

console.log(
"Kaufhistorie aktiv"
);

</script>

</body>

</html>
